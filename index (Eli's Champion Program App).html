<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Champion Programs</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Champion">
<meta name="theme-color" content="#151A21">
<link rel="manifest" href='data:application/json,{"name":"Champion Programs","short_name":"Champion","display":"standalone","background_color":"%23EDEFEA","theme_color":"%23151A21","start_url":"."}'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EDEFEA;
    --card:#FFFFFF;
    --ink:#151A21;
    --muted:#626B77;
    --line:#DCE0D8;
    --rail-1:#E4A70A; /* yellow band */
    --rail-2:#D7263D; /* red band */
    --rail-3:#1F8A4C; /* green band */
    --rail-4:#2456E6; /* blue band */
    --rail-5:#7A3FB8; /* purple band */
    --demo:#D7263D;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{font-size:16px}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Barlow',system-ui,-apple-system,sans-serif;
    line-height:1.45;
    padding-bottom:64px;
  }
  .wrap{max-width:640px;margin:0 auto;padding:0 14px}

  /* ---------- header ---------- */
  header{
    background:var(--ink);color:#F4F5F2;
    padding:18px 0 16px;
    position:sticky;top:0;z-index:20;
    box-shadow:0 2px 10px rgba(15,20,26,.25);
  }
  header .wrap{display:flex;align-items:center;gap:12px}
  .brand h1{
    font-family:'Barlow Condensed';font-weight:700;font-size:1.55rem;
    letter-spacing:.04em;text-transform:uppercase;line-height:1.05;
  }
  .brand p{font-size:.78rem;color:#A9B1BC;letter-spacing:.02em}
  .backBtn{
    background:transparent;border:1.5px solid #4A545F;color:#F4F5F2;
    border-radius:10px;font-family:'Barlow Condensed';font-weight:600;
    font-size:1rem;letter-spacing:.05em;text-transform:uppercase;
    padding:8px 14px;cursor:pointer;flex-shrink:0;
  }
  .backBtn:active{background:#2A323C}

  /* ---------- home ---------- */
  .homeIntro{margin:20px 2px 14px}
  .homeIntro h2{font-family:'Barlow Condensed';font-weight:600;font-size:1.15rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .progCard{
    display:block;width:100%;text-align:left;
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px 16px 14px;margin-bottom:12px;cursor:pointer;
    box-shadow:0 1px 2px rgba(21,26,33,.05);
    transition:transform .08s ease;
  }
  .progCard:active{transform:scale(.985)}
  .progCard h3{
    font-family:'Barlow Condensed';font-weight:700;font-size:1.45rem;
    letter-spacing:.02em;text-transform:uppercase;line-height:1.1;
  }
  .progCard .freq{color:var(--muted);font-size:.86rem;margin-top:3px}
  .progCard .meta{
    display:inline-block;margin-top:9px;
    font-family:'Barlow Condensed';font-weight:600;font-size:.92rem;
    letter-spacing:.08em;text-transform:uppercase;
    color:var(--ink);background:var(--bg);
    border-radius:6px;padding:2px 9px;
  }

  /* ---------- program view ---------- */
  .progHead{margin:20px 2px 4px}
  .progHead h2{font-family:'Barlow Condensed';font-weight:700;font-size:1.75rem;text-transform:uppercase;letter-spacing:.02em;line-height:1.08}
  .progHead .freq{color:var(--muted);font-size:.9rem;margin-top:4px}
  .progNote{
    background:#FDF6E3;border:1px solid #EAD9A0;border-radius:10px;
    padding:10px 12px;font-size:.86rem;color:#5C4A12;margin:12px 0 4px;
  }
  .tabs{
    display:flex;gap:8px;overflow-x:auto;padding:14px 2px 10px;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex-shrink:0;border:1.5px solid var(--ink);background:transparent;color:var(--ink);
    border-radius:10px;padding:9px 16px;cursor:pointer;
    font-family:'Barlow Condensed';font-weight:700;font-size:1.05rem;
    letter-spacing:.06em;text-transform:uppercase;
  }
  .tab.on{background:var(--ink);color:#F4F5F2}
  .progressRow{display:flex;align-items:center;gap:10px;margin:2px 2px 14px}
  .progressBar{flex:1;height:6px;border-radius:3px;background:var(--line);overflow:hidden}
  .progressBar span{display:block;height:100%;background:var(--ink);border-radius:3px;transition:width .2s}
  .progressTxt{font-family:'Barlow Condensed';font-weight:600;font-size:.95rem;letter-spacing:.04em;color:var(--muted);white-space:nowrap}
  .resetBtn{
    border:none;background:transparent;color:var(--muted);
    font-size:.8rem;text-decoration:underline;cursor:pointer;padding:4px;
  }

  /* ---------- groups & exercises ---------- */
  .group{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    margin-bottom:14px;overflow:hidden;
    box-shadow:0 1px 2px rgba(21,26,33,.05);
    display:flex;
  }
  .rail{width:6px;flex-shrink:0}
  .groupBody{flex:1;min-width:0;padding:13px 14px 6px}
  .groupTitle{
    font-family:'Barlow Condensed';font-weight:700;font-size:1.08rem;
    letter-spacing:.07em;text-transform:uppercase;margin-bottom:2px;
  }
  .groupSub{font-size:.82rem;color:var(--muted);margin-bottom:4px}
  .ex{padding:11px 0 12px;border-top:1px dashed var(--line)}
  .group .ex:first-of-type{border-top:none}
  .exTop{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .lb{
    font-family:'Barlow Condensed';font-weight:700;font-size:.9rem;
    background:var(--bg);border-radius:5px;padding:1px 7px;letter-spacing:.05em;
  }
  .exName{font-weight:600;font-size:1rem;line-height:1.3}
  .rx{
    font-family:'Barlow Condensed';font-weight:700;font-size:1.02rem;
    letter-spacing:.03em;white-space:nowrap;margin-left:auto;
    font-variant-numeric:tabular-nums;
  }
  .exNotes{margin-top:4px;font-size:.84rem;color:var(--muted)}
  .exNotes div{padding-left:10px;position:relative}
  .exNotes div::before{content:"–";position:absolute;left:0}
  .exActions{display:flex;align-items:center;gap:10px;margin-top:9px;flex-wrap:wrap}
  .demo{
    display:inline-flex;align-items:center;gap:6px;
    border:1.5px solid var(--demo);color:var(--demo);background:transparent;
    border-radius:8px;padding:6px 12px;
    font-family:'Barlow Condensed';font-weight:700;font-size:.95rem;
    letter-spacing:.06em;text-transform:uppercase;text-decoration:none;
  }
  .demo:active{background:#FBEBED}
  .demo svg{width:11px;height:11px}
  .pills{display:flex;gap:7px;margin-left:auto}
  .pill{
    width:36px;height:36px;border-radius:50%;
    border:1.5px solid var(--line);background:var(--bg);color:var(--muted);
    font-family:'Barlow Condensed';font-weight:700;font-size:1rem;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .pill.done{color:#fff;border-color:transparent}
  .pillUnit{font-size:.7rem;color:var(--muted);align-self:center;letter-spacing:.04em;text-transform:uppercase}

  /* drill sub-lists (pogo variants, ladder patterns, etc.) */
  .subs{margin-top:8px}
  .sub{
    display:flex;align-items:center;gap:10px;
    padding:7px 0;border-top:1px dotted var(--line);
  }
  .sub:first-child{border-top:none}
  .subName{font-size:.92rem;font-weight:500;flex:1;min-width:0}
  .subRx{font-family:'Barlow Condensed';font-weight:600;font-size:.92rem;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums}
  .subDemo{
    display:inline-flex;align-items:center;justify-content:center;
    width:34px;height:30px;border:1.5px solid var(--demo);border-radius:7px;
    color:var(--demo);text-decoration:none;flex-shrink:0;
  }
  .subDemo svg{width:10px;height:10px}

  .sessionNote{
    text-align:center;font-size:.78rem;color:var(--muted);
    margin:18px 6px 8px;
  }
  footer{
    text-align:center;font-size:.75rem;color:var(--muted);
    padding:10px 14px 26px;
  }
</style>
</head>

<header>
  <div class="wrap">
    <button class="backBtn" id="backBtn" style="display:none">&#8592; All</button>

</header>

<main class="wrap" id="main"></main>
<footer id="foot"></footer>

/* ============================================================
   STATE + RENDERING
   ============================================================ */
const state = { view:"home", prog:null, day:0, done:{} };
/* Persist progress between sessions (works once the app is hosted;
   falls back silently to session-only if storage is unavailable). */
const STORE = "champion-progress";
try {
  const saved = localStorage.getItem(STORE);
  if(saved) state.done = JSON.parse(saved) || {};
} catch(e) { /* storage unavailable — session-only mode */ }
function persist(){
  try { localStorage.setItem(STORE, JSON.stringify(state.done)); } catch(e) {}
}
const RAILS = ["var(--rail-1)","var(--rail-2)","var(--rail-3)","var(--rail-4)","var(--rail-5)"];
const main = document.getElementById("main");
const foot = document.getElementById("foot");
const backBtn = document.getElementById("backBtn");
const hTitle = document.getElementById("hTitle");
const hSub = document.getElementById("hSub");

backBtn.addEventListener("click", () => { state.view = "home"; state.prog = null; render(); window.scrollTo(0,0); });

function key(p,d,g,i,s){ return [p,d,g,i,s].join("|"); }

function dayTotals(prog, dIdx){
  let total = 0, done = 0;
  prog.days[dIdx].groups.forEach((g,gi) => g.items.forEach((it,ii) => {
    for(let s=0; s<it.sets; s++){
      total++;
      if(state.done[key(prog.id,dIdx,gi,ii,s)]) done++;
    }
  }));
  return {total, done};
}

function render(){
  if(state.view === "home") renderHome(); else renderProgram();
}

function renderHome(){
  backBtn.style.display = "none";
  hTitle.textContent = "Champion Programs";
  hSub.textContent = "PT programs from Dan Pope \u00B7 tap any exercise's Demo to watch";
  let html = '<div class="homeIntro"><h2>Pick a program</h2></div>';
  PROGRAMS.forEach(p => {
    const dayWord = p.days.length === 1 ? p.days[0].name : p.days.length + " days";
    html += '<button class="progCard" data-prog="' + p.id + '">' +
      '<h3>' + p.title + '</h3>' +
      '<div class="freq">' + p.freq + '</div>' +
      '<span class="meta">' + dayWord + '</span>' +
      '</button>';
  });
  main.innerHTML = html;
  foot.textContent = "Set check-offs last for this session only \u2014 they reset if the page reloads.";
  main.querySelectorAll(".progCard").forEach(btn => btn.addEventListener("click", () => {
    state.prog = PROGRAMS.find(p => p.id === btn.dataset.prog);
    state.day = 0; state.view = "prog";
    render(); window.scrollTo(0,0);
  }));
}

function renderProgram(){
  const p = state.prog;
  backBtn.style.display = "inline-block";
  hTitle.textContent = p.title;
  hSub.textContent = p.freq;

  let html = "";
  if(p.note) html += '<div class="progNote">' + p.note + '</div>';

  if(p.days.length > 1){
    html += '<div class="tabs">';
    p.days.forEach((d,i) => {
      html += '<button class="tab' + (i === state.day ? ' on' : '') + '" data-day="' + i + '">' + d.name + '</button>';
    });
    html += '</div>';
  } else {
    html += '<div style="height:14px"></div>';
  }

  const t = dayTotals(p, state.day);
  const pct = t.total ? Math.round(100 * t.done / t.total) : 0;
  html += '<div class="progressRow">' +
    '<div class="progressBar"><span style="width:' + pct + '%"></span></div>' +
    '<div class="progressTxt">' + t.done + ' / ' + t.total + ' sets</div>' +
    '<button class="resetBtn" id="resetDay">reset</button></div>';

  p.days[state.day].groups.forEach((g,gi) => {
    const rail = RAILS[gi % RAILS.length];
    html += '<div class="group"><div class="rail" style="background:' + rail + '"></div><div class="groupBody">';
    if(g.title) html += '<div class="groupTitle">' + g.title + '</div>';
    if(g.sub) html += '<div class="groupSub">' + g.sub + '</div>';
    g.items.forEach((it,ii) => {
      html += '<div class="ex"><div class="exTop">';
      if(it.lb) html += '<span class="lb">' + it.lb + '</span>';
      html += '<span class="exName">' + it.name + '</span>';
      if(it.rx) html += '<span class="rx">' + it.rx + '</span>';
      html += '</div>';
      if(it.notes && it.notes.length){
        html += '<div class="exNotes">' + it.notes.map(n => '<div>' + n + '</div>').join('') + '</div>';
      }
      html += '<div class="exActions">';
      if(it.url) html += '<a class="demo" href="' + it.url + '" target="_blank" rel="noopener">' + PLAY + ' Demo</a>';
      html += '<div class="pills">';
      for(let s=0; s<it.sets; s++){
        const k = key(p.id, state.day, gi, ii, s);
        const on = !!state.done[k];
        html += '<button class="pill' + (on ? ' done' : '') + '"' +
          (on ? ' style="background:' + rail + '"' : '') +
          ' data-k="' + k + '" data-rail="' + rail + '">' + (s+1) + '</button>';
      }
      html += '</div>';
      if(it.unit === "round") html += '<span class="pillUnit">rounds</span>';
      html += '</div>';
      if(it.subs && it.subs.length){
        html += '<div class="subs">';
        it.subs.forEach(sb => {
          html += '<div class="sub">';
          if(sb.url) html += '<a class="subDemo" href="' + sb.url + '" target="_blank" rel="noopener">' + PLAY + '</a>';
          html += '<span class="subName">' + sb.name + '</span>';
          if(sb.rx) html += '<span class="subRx">' + sb.rx + '</span>';
          html += '</div>';
        });
        html += '</div>';
      }
      html += '</div>'; // .ex
    });
    html += '</div></div>'; // .groupBody .group
  });

  html += '<div class="sessionNote">Tap a numbered circle to check off each set as you finish. Use reset to clear the day before your next session.</div>';
  main.innerHTML = html;
  foot.textContent = "";

  main.querySelectorAll(".tab").forEach(tb => tb.addEventListener("click", () => {
    state.day = +tb.dataset.day; render(); window.scrollTo(0,0);
  }));
  const rb = document.getElementById("resetDay");
  if(rb) rb.addEventListener("click", () => {
    const p2 = state.prog;
    p2.days[state.day].groups.forEach((g,gi) => g.items.forEach((it,ii) => {
      for(let s=0; s<it.sets; s++) delete state.done[key(p2.id, state.day, gi, ii, s)];
    }));
    persist();
    render();
  });
  main.querySelectorAll(".pill").forEach(pl => pl.addEventListener("click", () => {
    const k = pl.dataset.k;
    state.done[k] = !state.done[k];
    if(!state.done[k]) delete state.done[k];
    persist();
    if(state.done[k]){ pl.classList.add("done"); pl.style.background = pl.dataset.rail; }
    else { pl.classList.remove("done"); pl.style.background = ""; }
    // update progress bar without full re-render
    const t2 = dayTotals(state.prog, state.day);
    const bar = main.querySelector(".progressBar span");
    const txt = main.querySelector(".progressTxt");
    if(bar) bar.style.width = (t2.total ? Math.round(100*t2.done/t2.total) : 0) + "%";
    if(txt) txt.textContent = t2.done + " / " + t2.total + " sets";
  }));
}

render();
</script>
